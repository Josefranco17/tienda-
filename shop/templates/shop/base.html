<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda de camisetas</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" integrity="sha512-NhscBq/dvN6N6IxypRcH3QW5r4dpZkFJW7G7vRx+gTjRsMvvHj3f9NHJxU63X5fGv8U6HhVH4RnJx+hcOaizOg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/static/shop/css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="contenedor">
            <h1><a href="/">Camisetas de fútbol</a></h1>
            <nav>
                <a href="/">Inicio</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'carrito' %}">Carrito ({{ user.carritoitem_set.count }})</a>
                    <a href="{% url 'logout' %}">Salir</a>
                {% else %}
                    <a href="{% url 'login' %}">Ingresar</a>
                    <a href="{% url 'register' %}">Registrarse</a>
                {% endif %}
            </nav>
        </div>
    </header>
    <main class="contenedor">
        {% if messages %}
            <div class="mensajes">
                {% for message in messages %}
                    <div class="mensaje {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
